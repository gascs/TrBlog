version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: trblog-postgres
    environment:
      POSTGRES_USER: trblog
      POSTGRES_PASSWORD: trblog123
      POSTGRES_DB: trblog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trblog"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: trblog-postgres-data
