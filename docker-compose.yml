services:
  postgres:
    image: postgres:16-alpine
    container_name: trblog-postgres
    environment:
      POSTGRES_USER: trblog
      POSTGRES_PASSWORD: trblog123
      POSTGRES_DB: trblog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trblog"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: trblog-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: trblog-server
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://trblog:trblog123@postgres:5432/trblog?schema=public"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "your-super-secret-jwt-key-change-this-in-production"
      JWT_EXPIRES_IN: "7d"
      PORT: 3000
      NODE_ENV: "development"

  client:
    build: 
      context: ./client
      dockerfile: Dockerfile
    container_name: trblog-client
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    name: trblog-postgres-data
  redis_data:
    name: trblog-redis-data
